name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  # 6.10.x LTS — earlier versions' CMake machinery emits `--alias-cycle=error`
  # (and similar `=error` levels) to qmllint, but the `error` level was only
  # added to qmllint in 6.10. 6.7.2 and 6.8.3 qmllint both reject it with
  # "Invalid logging level 'error'". The ARM32 static build still pins
  # Qt 6.7.2 (built from source in its own toolchain image); this env is
  # only for desktop CI via aqtinstall.
  QT_VERSION: "6.10.3"
  # CI doesn't reuse incremental metadata across runs — it only bloats the
  # cached `target/` and slows the Swatinem post-cache upload.
  CARGO_INCREMENTAL: 0
  # Strip debug info from test binaries to keep `target/` small for caching.
  CARGO_PROFILE_TEST_DEBUG: 0
  CARGO_TERM_COLOR: always

jobs:
  rust-lint:
    name: Rust lint (fmt + clippy + deny)
    runs-on: ubicloud-standard-8
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Drop flaky Azure apt mirror
        # Ubicloud's runner image points apt at azure.archive.ubuntu.com
        # via /etc/apt/apt-mirrors.txt. That mirror intermittently times
        # out and stalls install-qt-action's apt-get update for several
        # minutes while apt retries before reaching archive.ubuntu.com.
        # Rewrite all azure references to the canonical mirror so apt
        # goes straight there.
        run: |
          for f in /etc/apt/apt-mirrors.txt /etc/apt/sources.list \
                   /etc/apt/sources.list.d/*.list /etc/apt/sources.list.d/*.sources; do
            [ -f "$f" ] && sudo sed -i 's|http://azure\.archive\.ubuntu\.com|http://archive.ubuntu.com|g' "$f"
          done
      - name: Install mold
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
        with:
          packages: mold
          version: 1.0
      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: qtshadertools
          cache: true
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: rust
          # QT_VERSION contributes to cache key — cxx-qt-lib's build.rs bakes
          # Qt library paths and linker flags into target/, so stale cache
          # from a different Qt version leaves dangling `-l` refs.
          env-vars: "CARGO CC CFLAGS CXX CMAKE RUST QT"
      - uses: taiki-e/install-action@cf525cb33f51aca27cd6fa02034117ab963ff9f1 # v2
        with:
          tool: cargo-deny
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo-deny
        run: cargo deny check

  rust-test:
    name: Rust tests (nextest)
    runs-on: ubicloud-standard-8
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Drop flaky Azure apt mirror
        # Ubicloud's runner image points apt at azure.archive.ubuntu.com
        # via /etc/apt/apt-mirrors.txt. That mirror intermittently times
        # out and stalls install-qt-action's apt-get update for several
        # minutes while apt retries before reaching archive.ubuntu.com.
        # Rewrite all azure references to the canonical mirror so apt
        # goes straight there.
        run: |
          for f in /etc/apt/apt-mirrors.txt /etc/apt/sources.list \
                   /etc/apt/sources.list.d/*.list /etc/apt/sources.list.d/*.sources; do
            [ -f "$f" ] && sudo sed -i 's|http://azure\.archive\.ubuntu\.com|http://archive.ubuntu.com|g' "$f"
          done
      - name: Install mold
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
        with:
          packages: mold
          version: 1.0
      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: qtshadertools
          cache: true
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: rust
          env-vars: "CARGO CC CFLAGS CXX CMAKE RUST QT"
      - uses: taiki-e/install-action@cf525cb33f51aca27cd6fa02034117ab963ff9f1 # v2
        with:
          tool: cargo-nextest
      - name: nextest
        run: cargo nextest run --workspace

  desktop-build:
    # Folds the old `cpp-lint` job in: clang-tidy needs compile_commands.json
    # and the autogen/moc outputs that the desktop build already produces, so
    # running lint as the final step of the same job avoids building twice.
    name: Desktop build + ctest + lint
    runs-on: ubicloud-standard-8
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Drop flaky Azure apt mirror
        # Ubicloud's runner image points apt at azure.archive.ubuntu.com
        # via /etc/apt/apt-mirrors.txt. That mirror intermittently times
        # out and stalls install-qt-action's apt-get update for several
        # minutes while apt retries before reaching archive.ubuntu.com.
        # Rewrite all azure references to the canonical mirror so apt
        # goes straight there.
        run: |
          for f in /etc/apt/apt-mirrors.txt /etc/apt/sources.list \
                   /etc/apt/sources.list.d/*.list /etc/apt/sources.list.d/*.sources; do
            [ -f "$f" ] && sudo sed -i 's|http://azure\.archive\.ubuntu\.com|http://archive.ubuntu.com|g' "$f"
          done
      - name: Install system deps
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
        with:
          packages: cmake ninja-build mold clang-tidy clang-format libgl1-mesa-dev libxkbcommon-dev libxcb-xkb-dev libvulkan-dev
          version: 1.0
      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: qtshadertools
          cache: true
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: rust
          env-vars: "CARGO CC CFLAGS CXX CMAKE RUST QT"
      # ccache wraps clang/gcc invocations; CMake's launcher hooks pick it up
      # via CMAKE_{C,CXX}_COMPILER_LAUNCHER set on the configure command line
      # below. QT_VERSION is part of the cache key because Qt include paths
      # are baked into preprocessed translation units.
      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
        with:
          key: desktop-build-${{ env.QT_VERSION }}
          max-size: 500M
      - name: Configure
        run: >
          cmake --preset desktop-debug
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
      - name: Build
        run: cmake --build --preset desktop-debug
      - name: Test
        run: ctest --preset desktop-debug
      - name: Lint (clang-format + clang-tidy + qmllint)
        run: cmake --build build --target lint
      - name: Upload launcher binary
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: launcher-debug-${{ github.run_id }}
          path: build/bin/launcher
          if-no-files-found: warn
          retention-days: 7

