---
repos:
  # C++ formatting check via clang-format
  - repo: https://github.com/cpp-linter/cpp-linter-hooks
    rev: v1.4.0
    hooks:
      - id: clang-format
        args: [--style=file, --version=18]
        types_or: [c++, c]

  # CMake formatting
  - repo: https://github.com/cheshirekow/cmake_format
    rev: v0.6.13
    hooks:
      - id: cmake-format
        args: [--config-files, .cmake-format.yaml]

  # QML formatting — runs qmlformat in-place on changed .qml files
  - repo: local
    hooks:
      - id: qmlformat
        name: qmlformat
        entry: qmlformat
        args: [--inplace]
        language: system
        types: [file]
        files: \.qml$
        pass_filenames: true

  # Rust formatting — runs cargo fmt across the whole workspace when any
  # .rs file changes. pass_filenames is false because cargo fmt picks up
  # the workspace targets from rust/Cargo.toml directly.
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --manifest-path rust/Cargo.toml --all
        language: system
        types: [rust]
        pass_filenames: false

  # Basic file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
        exclude: \.(png|ttf|ico|icns|jpg)$
      - id: trailing-whitespace
        exclude: \.(png|ttf|ico|icns|jpg)$
      - id: check-yaml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: \.(png|ttf|ico|icns|jpg)$
...
